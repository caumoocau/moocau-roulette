<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>푸앙이의 오늘의 운세 & K-MOOC 강좌 룰렛</title>
<meta property="og:title" content="오늘 내 운명의 K-MOOC 강좌는? | 푸앙이의 강좌 룰렛">
<meta property="og:description" content="룰렛 한 번 돌리고 오늘의 운세 + 딱 맞는 K-MOOC 강좌 추천받기!">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
  --navy:#143365; --blue:#2B95C3; --sky:#3DB1D3; --light:#6BBEE2;
  --pink:#DEACC5; --pink-light:#F2D6E3; --beige:#D7BCA1; --white:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Pretendard Variable',Pretendard,-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  background:radial-gradient(circle at 50% 0%,#1d4a8a 0%,var(--navy) 60%,#0e2547 100%);
  min-height:100vh;display:flex;justify-content:center;color:var(--navy);
}
.app{width:100%;max-width:480px;min-height:100vh;padding:22px 16px 40px;display:flex;flex-direction:column}
.card{background:var(--white);border-radius:28px;padding:24px 18px 30px;box-shadow:0 18px 50px rgba(0,0,0,.28);margin-top:48px}
.badge{display:inline-block;background:var(--pink-light);color:var(--navy);font-size:13px;font-weight:700;padding:7px 16px;border-radius:999px;letter-spacing:.4px}
.head{text-align:center;color:var(--navy)}
.head h1{font-size:26px;font-weight:800;line-height:1.35;margin:14px 0 4px}
.head h1 .hl{color:var(--light)}
.head .date{font-size:13.5px;color:#8aa0bf;font-weight:600;margin-top:2px}
.wheel-wrap{position:relative;width:320px;height:320px;margin:26px auto 8px}
.pointer{position:absolute;top:-6px;left:50%;transform:translateX(-50%);z-index:5;
  width:0;height:0;border-left:18px solid transparent;border-right:18px solid transparent;
  border-top:30px solid var(--pink);filter:drop-shadow(0 3px 4px rgba(0,0,0,.35))}
.pointer:after{content:'';position:absolute;top:-38px;left:-9px;width:18px;height:18px;border-radius:50%;background:var(--pink);box-shadow:0 2px 4px rgba(0,0,0,.3)}
#wheel{width:100%;height:100%;border-radius:50%;
  box-shadow:0 0 0 10px var(--white),0 0 0 15px var(--navy),0 16px 40px rgba(0,0,0,.4);
  transition:transform 5s cubic-bezier(.16,.84,.3,1)}
.hub{position:absolute;top:50%;left:50%;width:74px;height:74px;transform:translate(-50%,-50%);
  background:var(--white);border-radius:50%;z-index:4;display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 12px rgba(0,0,0,.25);overflow:hidden}
.hub img{width:66px;height:66px;object-fit:contain;margin-top:6px}
.spin-btn{display:block;width:100%;max-width:320px;margin:20px auto 0;border:none;cursor:pointer;
  font-family:inherit;border-radius:16px;padding:18px;font-size:19px;font-weight:800;
  background:var(--pink);color:var(--navy);box-shadow:0 8px 22px rgba(222,172,197,.5);transition:transform .15s}
.spin-btn:active{transform:scale(.97)}
.spin-btn:disabled{opacity:.55;cursor:default}
.hint{text-align:center;color:#8aa0bf;font-size:12.5px;margin-top:12px}
.overlay{position:fixed;inset:0;background:rgba(10,25,50,.72);display:none;align-items:flex-end;justify-content:center;z-index:20}
.overlay.show{display:flex;animation:fade .3s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:480px;background:var(--white);border-radius:28px 28px 0 0;padding:26px 22px 30px;max-height:92vh;overflow-y:auto;animation:up .4s cubic-bezier(.2,.8,.3,1)}
@keyframes up{from{transform:translateY(100%)}to{transform:translateY(0)}}
.sheet-grip{width:44px;height:5px;background:#d7dee8;border-radius:3px;margin:0 auto 18px}
.fortune{background:linear-gradient(150deg,var(--navy),var(--blue));border-radius:20px;padding:20px 20px 22px;color:var(--white);text-align:center;position:relative;overflow:hidden}
.fortune .star{position:absolute;font-size:15px;opacity:.5}
.fortune .f-label{font-size:12.5px;font-weight:700;letter-spacing:1px;color:var(--pink-light)}
.fortune .f-luck{font-size:22px;font-weight:800;margin:8px 0 2px}
.fortune .f-text{font-size:14.5px;line-height:1.6;opacity:.95;word-break:keep-all}
.fortune .f-lucky{display:flex;gap:8px;justify-content:center;margin-top:14px;flex-wrap:wrap}
.f-chip{background:rgba(255,255,255,.16);border-radius:999px;padding:5px 13px;font-size:12px;font-weight:600}
.result-course{margin-top:20px}
.rc-label{font-size:13px;font-weight:700;color:var(--sky);display:flex;align-items:center;gap:7px}
.rc-label:before{content:'';width:5px;height:17px;background:var(--pink);border-radius:3px}
.course-card{display:block;text-decoration:none;color:inherit;border:2px solid var(--sky);border-radius:18px;padding:18px;margin-top:12px;
  background:linear-gradient(150deg,#f2fafd,#fff 55%);transition:box-shadow .15s}
.course-card:hover{box-shadow:0 8px 22px rgba(43,149,195,.22)}
.cc-chips{display:flex;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.chip{font-size:11.5px;font-weight:700;border-radius:999px;padding:4px 11px}
.chip-field{background:var(--pink-light);color:var(--navy)}
.chip-level{background:#e8f4fa;color:var(--blue)}
.cc-title{font-size:18px;font-weight:800;line-height:1.4;word-break:keep-all}
.cc-desc{font-size:13.5px;color:#5b6b85;line-height:1.6;margin-top:7px;word-break:keep-all}
.cc-go{margin-top:12px;font-size:14px;font-weight:800;color:var(--blue)}
.actions{margin-top:22px;display:flex;flex-direction:column;gap:10px}
.btn{display:block;width:100%;border:none;cursor:pointer;font-family:inherit;border-radius:15px;padding:16px;font-size:16px;font-weight:700;text-align:center;text-decoration:none;transition:transform .15s}
.btn:active{transform:scale(.97)}
.btn-pink{background:var(--pink);color:var(--navy)}
.btn-outline{background:var(--white);color:var(--navy);border:2px solid var(--navy)}
.btn-sub{background:#eef3f9;color:var(--navy);font-size:15px;padding:13px}
.foot{text-align:center;margin-top:22px;padding-top:0;color:rgba(255,255,255,.6);font-size:12px;line-height:1.7}
.toast{position:fixed;left:50%;bottom:34px;transform:translateX(-50%) translateY(80px);background:var(--navy);color:#fff;padding:12px 22px;border-radius:999px;font-size:14px;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.35);transition:transform .3s;z-index:40}
.toast.show{transform:translateX(-50%) translateY(0)}
</style>
</head>

const N=COURSES.length, seg=360/N;
function polar(cx,cy,r,deg){const a=(deg-90)*Math.PI/180;return[cx+r*Math.cos(a),cy+r*Math.sin(a)];}
(function buildWheel(){
  const svg=document.getElementById('wheel'); let s='';
  for(let i=0;i<N;i++){
    const a0=i*seg, a1=(i+1)*seg;
    const [x0,y0]=polar(50,50,50,a0), [x1,y1]=polar(50,50,50,a1);
    s+='<path d="M50 50 L'+x0.toFixed(2)+' '+y0.toFixed(2)+' A50 50 0 0 1 '+x1.toFixed(2)+' '+y1.toFixed(2)+' Z" fill="'+SLICE_COLORS[i%SLICE_COLORS.length]+'"/>';
  }
  svg.innerHTML=s;
})();
const now=new Date();

let lastFortuneIdx=-1, currentFortune=FORTUNES[0];
function pickFortune(){
  if(FORTUNES.length<2){ return FORTUNES[0]; }
  let i; do{ i=Math.floor(Math.random()*FORTUNES.length); }while(i===lastFortuneIdx);
  lastFortuneIdx=i; return FORTUNES[i];
}
let spinning=false, rotation=0;
function spin(){
  if(spinning) return; spinning=true;
  document.getElementById('spin').disabled=true;
  const pick=Math.floor(Math.random()*N);
  // 현재 각도에서 목표 칸이 바늘(위)에 오도록 상대 회전량 계산 (여러 바퀴 + 정렬)
  const desired=((360 - (pick*seg + seg/2)) % 360 + 360) % 360;
  const current=((rotation % 360) + 360) % 360;
  let delta=((desired - current) % 360 + 360) % 360;
  rotation += 360*6 + delta;
  document.getElementById('wheel').style.transform='rotate('+rotation+'deg)';
  const moods=Object.keys(HUB_IMGS);
  document.getElementById('hub-img').src=HUB_IMGS[moods[Math.floor(Math.random()*moods.length)]];
  setTimeout(function(){ showResult(pick); spinning=false; document.getElementById('spin').disabled=false; }, 5200);
}
function showResult(i){
  const c=COURSES[i], f=currentFortune=pickFortune();
  document.getElementById('fortune').innerHTML=
    '<span class="star" style="top:10px;left:16px">✦</span><span class="star" style="top:20px;right:22px">✧</span><span class="star" style="bottom:14px;left:30px">✦</span>'
    +'<div class="f-label">오늘의 운세</div><div class="f-luck">'+f.luck+'</div><div class="f-text">'+f.text+'</div>'
    +'<div class="f-lucky">'+f.lucky.map(function(x){return '<span class="f-chip">🍀 '+x+'</span>';}).join('')+'</div>';
  const card=document.getElementById('course-card'); card.href=c.url;
  card.innerHTML='<div class="cc-chips"><span class="chip chip-field">'+c.field+'</span><span class="chip chip-level">'+c.level+'</span></div>'
    +'<div class="cc-title">'+c.title+'</div><div class="cc-desc">'+c.desc+'</div><div class="cc-go">강좌 보러 가기 →</div>';
  document.getElementById('insta-btn').href=INSTA_URL;
  document.getElementById('overlay').classList.add('show');
  window._pick=c;
}
function closeSheet(){ document.getElementById('overlay').classList.remove('show'); }
document.getElementById('overlay').addEventListener('click',function(e){ if(e.target.id==='overlay') closeSheet(); });
function shareResult(){
  const isWeb=location.protocol==='http:'||location.protocol==='https:';
  const c=window._pick||{};
  const text='오늘 푸앙이가 뽑아준 내 강좌는 「'+c.title+'」! '+currentFortune.luck+' 너도 룰렛 돌려봐 🎯';
  const payload=isWeb?text+'\n'+location.href:text;
  if(isWeb && navigator.share){ navigator.share({title:'푸앙이의 오늘의 강좌 룰렛',text:text,url:location.href}).catch(function(){copyText(payload);}); }
  else copyText(payload);
}
function copyText(str){
  const ok=function(){toast(location.protocol==='file:'?'공유 문구가 복사됐어요! (배포 후엔 링크도 복사돼요)':'링크가 복사되었어요!');};
  if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(str).then(ok).catch(function(){legacy(str,ok);}); }
  else legacy(str,ok);
}
function legacy(str,done){
  const ta=document.createElement('textarea'); ta.value=str; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try{ document.execCommand('copy'); done(); }catch(e){ toast('복사에 실패했어요 😢'); }
  document.body.removeChild(ta);
}
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2200); }
